# =============================================================================
# Career Headlines — source list and settings
# =============================================================================
# This is the one file you edit day-to-day. Add/remove a `sources` entry to
# change what gets pulled; tweak `settings` and `keywords` to re-tune.
#
# `category` is the thematic SECTION a source appears under on the page (and
# the label on its filter chip). Group sources by theme, not by country.
#
# Feed URLs are best-effort. A source whose feed is unreachable or has no valid
# RSS is skipped with a warning (the run still succeeds), so you can correct
# URLs over time. Run `python -m career_headlines --check-sources` on a machine
# with open network access to see which feeds currently resolve.
#
# Note: a few big sites (World Economic Forum, OECD) sit behind Cloudflare bot
# protection and often refuse automated feed requests regardless of URL. They
# are kept as best-effort; the Future of Work section is well covered by the
# other sources if they don't come through.
# =============================================================================

settings:
  recency_hours: 48        # soft window: only include items newer than this
  max_items: 60            # hard cap on stories per run (controls API cost)
  model: claude-haiku-4-5  # efficient, cheap model for one-line summaries
  summary_batch_size: 10   # articles summarised per Claude API call
  timezone: Europe/London
  site_title: Career Headlines

keywords:
  # An item is kept only if its title/summary mentions one of these. The list
  # is deliberately broad — careers, employment, skills and the future of work.
  topics:
    - career
    - careers
    - employability
    - employment
    - employer
    - hiring
    - recruit
    - recruitment
    - talent
    - workforce
    - labour market
    - labor market
    - job
    - jobs
    - vacancy
    - vacancies
    - skill
    - skills
    - reskilling
    - upskilling
    - training
    - apprentice
    - apprenticeship
    - vocational
    - vet
    - technical education
    - graduate
    - guidance
    - work experience
    - future of work
    - world of work
    - automation
    - productivity
    - wages
    - economic inactivity
    - neet
    - further education
    - higher education
  # Items matching these get an "AI" badge (AI cuts across every section).
  ai:
    - artificial intelligence
    - " ai "
    - "(ai)"
    - generative ai
    - genai
    - machine learning
    - automation
    - chatgpt
    - large language model
    - agentic

